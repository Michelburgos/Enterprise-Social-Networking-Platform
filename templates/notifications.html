{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notificaciones — Pulse</title>

<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body>

<div class="app-shell">

  <!-- ===== Nav lateral ===== -->
  <nav class="col-nav">
    <div class="brand">
      <div class="brand-mark">P</div>
      <div class="brand-name">Pulse</div>
    </div>

    <ul class="nav-list">
      <li>
        <a href="{% url 'feed' %}" class="nav-item">
          Inicio
        </a>
      </li>

      <li>
        <a href="{% url 'profile' %}" class="nav-item">
          Mi perfil
        </a>
      </li>

      <li>
        <a href="{% url 'notifications' %}" class="nav-item is-active">
          Notificaciones
          <span class="nav-badge" id="notifBadge" style="display:none">0</span>
        </a>
      </li>
    </ul>

    <button class="nav-compose" onclick="window.location.href='{% url 'feed' %}'">
      Publicar
    </button>

    <a href="{% url 'profile' %}" style="display:block; text-decoration:none; color:inherit;">
      <div class="nav-account" data-current-user>
        <div class="avatar avatar-placeholder" style="width:36px;height:36px;font-size:14px;">··</div>
        <div>
          <div class="nav-account-name">Cargando…</div>
          <div class="nav-account-role">&nbsp;</div>
        </div>
      </div>
    </a>

    
    <button class="btn btn-quiet" style="width:100%; margin-top:12px;" onclick="logout()">
      Cerrar sesión
    </button>
  </nav>

  <!-- ===== Notificaciones ===== -->
  <main>
    <div class="feed-header">
      <div class="feed-eyebrow">Al día</div>
      <h1 class="feed-title">Notificaciones</h1>
    </div>

    <div class="mark-all">
      <button class="btn btn-ghost" id="markAllBtn">
        Marcar todo como leído
      </button>
    </div>

    <div id="notifList"></div>
  </main>

  <aside class="col-side"></aside>

</div>

<!-- JS -->
<script src="{% static 'js/api.js' %}"></script>

<script>
  Auth.requireLogin();

  (async function init(){
    await loadCurrentUserIntoNav();
    loadNotifications();
  })();

  const ICONS = {
    like: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.6-9.5-9.1C.8 8.3 2.4 5 5.7 5c1.9 0 3.3 1 4.3 2.4C11 6 12.4 5 14.3 5c3.3 0 4.9 3.3 3.2 6.9C19 16.4 12 21 12 21z"/></svg>`,
    comentario: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>`,
    follow: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>`,
  };

  const VERB = {
    like: "le dio like a tu publicación",
    comentario: "comentó tu publicación",
    follow: "empezó a seguirte",
  };

  async function loadNotifications(){
    const listEl = document.getElementById("notifList");

    try{
      const res = await apiFetch("/notifications/");

      if (!res.ok){
        listEl.innerHTML = emptyState("No se pudieron cargar las notificaciones");
        return;
      }

      const data = await res.json();
      const items = data.results || data;

      updateBadge(items);

      if (!items.length){
        listEl.innerHTML = emptyState(
          "Todo tranquilo por aquí",
          "Te avisaremos cuando algo nuevo pase."
        );
        return;
      }

      listEl.innerHTML = items.map(notifHTML).join("");

    } catch(err){
      listEl.innerHTML = emptyState("Sin conexión con el servidor");
    }
  }

  function notifHTML(n){
    
    const senderName = n.sender_name || n.sender?.first_name || "Alguien";
    const type = (n.notification_type || "").toLowerCase();

    const verb = VERB[type] || "interactuó contigo";
    const icon = ICONS[type] || ICONS.follow;

    
    return `
      <div class="notif-item ${n.is_read ? "" : "is-unread"}">
        <div class="notif-icon">${icon}</div>

        <div style="flex:1">
          <div class="notif-text">
            <b>${escapeHTML(senderName)}</b>
            ${verb}
          </div>

          <div class="notif-time">
            ${timeAgo(n.created_at)}
          </div>
        </div>

        ${!n.is_read ? '<div class="notif-dot"></div>' : ""}
      </div>
    `;
  }

  function updateBadge(items){
    const unread = items.filter(n => !n.is_read).length;
    const badge = document.getElementById("notifBadge");

    if (unread > 0){
      badge.textContent = unread > 9 ? "9+" : unread;
      badge.style.display = "inline-block";
    } else {
      badge.style.display = "none";
    }
  }

  document.getElementById("markAllBtn").addEventListener("click", async () => {
    try{
      const res = await apiFetch("/notifications/read-all/", {
        method: "POST"
      });

      if (!res.ok) return showToast("No se pudo actualizar");

      showToast("Todo marcado como leído");
      loadNotifications();

    } catch(err){
      showToast("Sin conexión con el servidor");
    }
  });

  function emptyState(title, sub=""){
    return `
      <div class="empty-state">
        <div class="empty-state-title">${title}</div>
        <div>${sub}</div>
      </div>
    `;
  }
</script>

</body>
</html>
