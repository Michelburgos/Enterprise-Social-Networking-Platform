{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — Pulse</title>

<link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body>

<div class="auth-shell">
  <aside class="auth-aside">
    <div class="brand">
      <div class="brand-mark">P</div>
      <div class="brand-name" style="color:var(--paper)">Pulse</div>
    </div>
    <div>
      <p class="auth-quote">"Cada actualización, cada logro, cada 'buenos días' — todo en un solo lugar."</p>
      <p class="auth-quote-by">— por qué existe Pulse</p>
    </div>
  </aside>

  <div class="auth-form-side">
    <div class="auth-card">
      <h1 class="auth-title">Crea tu cuenta</h1>
      <p class="auth-sub">Únete al feed interno del equipo en menos de un minuto.</p>

      <div class="form-error" id="registerError"></div>

      <form id="registerForm">
        <div class="field-row">
          <div class="field">
            <label for="first_name">Nombre</label>
            <input type="text" id="first_name" name="first_name" placeholder="Camila" required autocomplete="given-name">
          </div>
          <div class="field">
            <label for="last_name">Apellido</label>
            <input type="text" id="last_name" name="last_name" placeholder="Ruiz" required autocomplete="family-name">
          </div>
        </div>

        <div class="field">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="camila.ruiz" required autocomplete="username">
        </div>

        <div class="field">
          <label for="email">Correo</label>
          <input type="email" id="email" name="email" placeholder="tu.nombre@empresa.com" required autocomplete="email">
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required autocomplete="new-password">
        </div>

        
        <div class="field">
          <label for="password2">Confirmar contraseña</label>
          <input type="password" id="password2" name="password2" placeholder="Repite tu contraseña" required autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary auth-submit" id="registerSubmit">
          Crear cuenta
        </button>
      </form>

      <p class="auth-switch">
        ¿Ya tienes cuenta?
        <a href="{% url 'login' %}">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>

<script src="{% static 'js/api.js' %}"></script>

<script>
  const form = document.getElementById("registerForm");
  const errorBox = document.getElementById("registerError");
  const submitBtn = document.getElementById("registerSubmit");

  if (typeof Auth !== "undefined" && Auth.isLoggedIn()) {
    window.location.href = "/feed/";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    errorBox.classList.remove("is-visible");
    submitBtn.disabled = true;
    submitBtn.textContent = "Creando…";

    const payload = {
      first_name: document.getElementById("first_name").value.trim(),
      last_name: document.getElementById("last_name").value.trim(),
      username: document.getElementById("username").value.trim(),
      email: document.getElementById("email").value.trim(),
      password: document.getElementById("password").value,
      password2: document.getElementById("password2").value  // 🔥 IMPORTANTE
    };

    try {
      const res = await fetch(`${API_BASE}/users/register/`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));

        const firstError = Object.values(data)[0];
        errorBox.textContent = Array.isArray(firstError)
          ? firstError[0]
          : (firstError || "Revisa los datos del formulario.");

        errorBox.classList.add("is-visible");
        submitBtn.disabled = false;
        submitBtn.textContent = "Crear cuenta";
        return;
      }

      if (typeof showToast !== "undefined") {
        showToast("Cuenta creada. Ahora inicia sesión.");
      }

      setTimeout(() => {
        window.location.href = "/login/";
      }, 900);

    } catch (err) {
      errorBox.textContent = "No hay conexión con el servidor. Intenta de nuevo.";
      errorBox.classList.add("is-visible");
      submitBtn.disabled = false;
      submitBtn.textContent = "Crear cuenta";
    }
  });
</script>

</body>
</html>
