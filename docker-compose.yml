version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=clave-secreta
    volumes:
      - sqlite_data:/app
      - media_data:/app/media
    command: >
      sh -c "python manage.py migrate &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    restart: unless-stopped

volumes:
  sqlite_data:
  media_data:



